<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: black;
        }

        * {
            box-sizing: border-box;
        }

        /* Add padding to containers */

        .container {
            padding: 16px;
            background-color: white;
        }

        /* Full-width input fields */

        input[type=text],
        input[type=password],
        input[type=text],
        input[type=text],
        input[type=text] {
            width: 100%;
            padding: 15px;
            margin: 5px 0 22px 0;
            display: list-block;
            border: none;
            background: #f1f1f1;
        }

        input[type=text]:focus,
        input[type=password]:focus,
        input[type=text]:focus,
        input[type=text]:focus,
        input[type=text]:focus {
            background-color: #ddd;
            outline: none;
        }

        /* Overwrite default styles of hr */

        hr {
            border: 1px solid #f1f1f1;
            margin-bottom: 25px;
        }

        /* Set a style for the submit button */

        .registerbtn {
            background-color: #04AA6D;
            color: white;
            padding: 16px 20px;
            margin: 8px 0;
            border: none;
            cursor: pointer;
            width: 50%;
            opacity: 0.9;
        }

        .registerbtn:hover {
            opacity: 1;
        }

        /* Add a blue text color to links */

        a {
            color: dodgerblue;
        }

        /* Set a grey background color and center the text of the "sign in" section */

        .signin {
            background-color: #f1f1f1;
            text-align: center;
        }
    </style>
</head>

<body>

<form>
    <div class="container">
        <h1>Order Details</h1>
        <p>Fill this form to place the order</p>
        <hr>

        <label for="email"><b>Email</b></label>
        <input type="text" placeholder="Enter Email" name="email" id="email" required>

        <label for="bookName"><b>ENTER THE NAME OF THE BOOK</b></label>
        <input type="text" placeholder="book name" name="bookName" id="bookName" required>

        <label for="password"><b>Password</b></label>
        <input type="password" placeholder="Password" name="psw" id="psw" required>

        <label for="contact_no"><b>ENTER THE CONTACT NO</b></label>
        <input type="text" placeholder="contact" name="contact" id="cont" required>

        <label for="address"><b>ENTER THE ADDRESS</b></label>
        <input type="text" placeholder="address" name="address" id="add" required>
        
       

        <hr>
        <p>By clicking order now you agree to our <a href="#">Terms & Privacy</a>.</p>
        <p>cash on delivery only acceptable</p>

        <button type="button" id="submitData" name="submitData" class="registerbtn">Order now</button>
    </div>

  
</form>

</body>
</html>

<script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.9.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.9.2/firebase-auth.js";
    import { getDatabase, set, ref, update } from "https://www.gstatic.com/firebasejs/9.9.2/firebase-database.js";
    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries
  
   // Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBEdApYEHw4fH_18slQodRohSRaH987BS0",
  authDomain: "thepragmatic-programmer.firebaseapp.com",
  projectId: "thepragmatic-programmer",
  storageBucket: "thepragmatic-programmer.appspot.com",
  messagingSenderId: "320891817484",
  appId: "1:320891817484:web:e89cffe3fe449dc2782829",
  measurementId: "G-WXP08F1GHF"
};

  
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const database = getDatabase(app);


    submitData.addEventListener('click',(e) => {

        var email = document.getElementById('email').value;
        var password = document.getElementById('psw').value;
        var bookName = document.getElementById('bookName').value;
        var cont = document.getElementById('cont').value;
        var add = document.getElementById('add').value;


        createUserWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
               // Signed in 
               const user = userCredential.user;
               // ... user.uid

               set(ref(database, 'users/' + user.uid), {
                   email: email,
                   password: password,
                   bookName:bookName,
                   cont:cont,
                   add:add
                })
                .then(() => {
                     // Data saved successfully!
                     alert('Booked successfully'); 
                })
                .catch((error) => {
                      
                      alert(error);
                });

                 alert('will arive in 5 days'); 

            })
            .catch((error) => {
                const errorCode = error.code;
                const errorMessage = error.message;
                // ..
                alert(errorMessage);


            });

     signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
    // Signed in 
    const user = userCredential.user;
    // ...

    var lgDate = new Date();

    update(ref(database, 'users/' + user.uid), {
                   last_login: lgDate,
                })
                .then(() => {
                     // Data saved successfully!
                     alert('Your orderis placed'); 
                })
                .catch((error) => {
                      // The write failed...
                      alert(error);
                });
  })
  .catch((error) => {
    const errorCode = error.code;
    const errorMessage = error.message;
    alert(errorMessage);
  });

  signOut(auth).then(() => {
  // Sign-out successful.
}).catch((error) => {
  // An error happened.
});



    });

</script>
  </script>
